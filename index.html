<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pniktrix — Wall Art Prints</title>

  <!-- ░░ FACEBOOK PIXEL — replace YOUR_PIXEL_ID ░░ -->

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
    document,'script','https://connect.facebook.net/en_US/fbevents.js');

  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/></noscript>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0E0D0C;
      --surface:  #181614;
      --card:     #1E1C1A;
      --ink:      #F2EDE6;
      --muted:    #7A7570;
      --gold:     #C9A84C;
      --gold-dim: #8A6E2E;
      --border:   rgba(255,255,255,0.08);
      --wa:       #25D366;
      --ig:       #E1306C;
      --font-h:   'Playfair Display', serif;
      --font-b:   'Jost', sans-serif;
      --r:        10px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-b);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #splash.out { opacity: 0; visibility: hidden; pointer-events: none; }

    .s-logo {
      font-family: var(--font-h);
      font-size: clamp(2.8rem, 11vw, 5rem);
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .s-sub {
      font-family: var(--font-b);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.6rem;
    }
    .s-line {
      height: 1px; background: var(--gold);
      width: 0; margin-top: 2rem;
      animation: grow-line 2.4s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes grow-line { to { width: 100px; } }

    /* ── HEADER ── */
    .hdr {
      position: sticky; top: 0; z-index: 100;
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem;
      background: rgba(14,13,12,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .hdr-logo {
      font-family: var(--font-h);
      font-size: 1.25rem; font-weight: 400;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--ink);
    }
    .hdr-cta {
      display: none;
      align-items: center; gap: 6px;
      background: var(--gold); color: #0E0D0C;
      border: none; border-radius: 50px;
      padding: 0.3rem 0.9rem;
      font-family: var(--font-b); font-size: 0.72rem;
      font-weight: 500; letter-spacing: 0.06em;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .hdr-cta.show { display: flex; }
    .hdr-cta:active { transform: scale(0.95); }
    .hdr-badge {
      background: #0E0D0C; color: var(--gold);
      border-radius: 50%; width: 17px; height: 17px;
      font-size: 0.6rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── HERO SLIDER ── */
    .hero {
      position: relative;
      height: min(72vw, 420px);
      overflow: hidden;
      background: var(--surface);
    }
    .hero-track {
      display: flex; height: 100%;
      transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .hero-slide {
      flex-shrink: 0; width: 100%; height: 100%;
      position: relative;
    }
    .hero-slide img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(14,13,12,0.85) 0%, transparent 55%);
    }
    .hero-text {
      position: absolute; bottom: 1.25rem; left: 1rem; right: 4rem;
    }
    .hero-text h2 {
      font-family: var(--font-h);
      font-size: clamp(1.3rem, 5vw, 2rem);
      font-weight: 400; color: var(--ink);
      line-height: 1.2;
    }
    .hero-text p {
      font-size: 0.72rem; color: var(--gold);
      letter-spacing: 0.12em; margin-top: 4px;
    }
    .hero-dots {
      position: absolute; bottom: 1rem; right: 1rem;
      display: flex; gap: 5px; flex-direction: column;
      align-items: center;
    }
    .hero-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted); cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .hero-dot.active { background: var(--gold); transform: scale(1.3); }

    /* ── SECTION LABEL ── */
    .sec-label {
      padding: 1.5rem 1rem 0.75rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .sec-label span {
      font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--muted);
    }
    .sec-label::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* ── PRODUCT GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      padding: 0 0 2px;
    }
    @media (min-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 860px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    .card {
      background: var(--card);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .card.sel {
      border-color: var(--gold);
    }
    .card.sel .card-img img { transform: scale(1.04); }
    .card.sel .tick { opacity: 1; transform: scale(1); }
    .card.sel .card-img::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(201,168,76,0.12);
    }

    .card-img {
      position: relative;
      aspect-ratio: 3/4; overflow: hidden;
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.5s ease;
    }
    .card:active .card-img img { transform: scale(1.03); }

    .tag {
      position: absolute; top: 7px; left: 7px;
      background: var(--gold); color: #0E0D0C;
      font-size: 0.52rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 2px;
    }

    .tick {
      position: absolute; top: 7px; right: 7px;
      width: 26px; height: 26px;
      background: var(--gold); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.4);
      transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tick svg { width: 12px; height: 12px; stroke: #0E0D0C; stroke-width: 2.5; fill: none; }

    .card-info { padding: 0.55rem 0.7rem 0.75rem; }
    .card-name {
      font-size: 0.78rem; font-weight: 400; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-price {
      font-size: 0.68rem; color: var(--gold);
      margin-top: 2px; font-weight: 300;
    }

    /* ── STICKY BOTTOM CTA ── */
    .sticky-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
      padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom));
      background: rgba(14,13,12,0.96);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      transform: translateY(110%);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .sticky-bar.up { transform: translateY(0); }

    .bar-inner {
      display: flex; gap: 10px; max-width: 480px; margin: 0 auto;
    }

    .btn-wa {
      flex: 1;
      background: var(--wa); color: #fff;
      border: none; border-radius: var(--r);
      padding: 0.85rem 0.5rem;
      font-family: var(--font-b); font-size: 0.78rem;
      font-weight: 500; letter-spacing: 0.05em;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 6px;
      transition: filter 0.2s, transform 0.15s;
    }
    .btn-wa:active { transform: scale(0.97); filter: brightness(0.9); }

    .btn-ig {
      flex: 1;
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: #fff;
      border: none; border-radius: var(--r);
      padding: 0.85rem 0.5rem;
      font-family: var(--font-b); font-size: 0.78rem;
      font-weight: 500; letter-spacing: 0.05em;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 6px;
      transition: filter 0.2s, transform 0.15s;
    }
    .btn-ig:active { transform: scale(0.97); filter: brightness(0.9); }

    .btn-icon { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── BOTTOM SPACER ── */
    .spacer { height: 100px; }

    /* ── TRUST STRIP ── */
    .trust {
      display: flex; justify-content: center;
      gap: 1.5rem; flex-wrap: wrap;
      padding: 1.5rem 1rem;
      border-top: 1px solid var(--border);
    }
    .trust-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.68rem; color: var(--muted);
      letter-spacing: 0.06em;
    }
    .trust-item svg { width: 13px; height: 13px; stroke: var(--gold); stroke-width: 1.8; fill: none; }

    /* ── SELECTED PREVIEW STRIP ── */
    .preview-strip {
      display: flex; gap: 6px;
      overflow-x: auto; padding: 0.6rem 1rem;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .preview-strip::-webkit-scrollbar { display: none; }
    .preview-strip.empty { display: none; }

    .pv-thumb {
      flex-shrink: 0;
      width: 44px; height: 56px;
      border-radius: 5px; overflow: hidden;
      border: 1.5px solid var(--gold);
      position: relative;
    }
    .pv-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── LOADING ── */
    .loading {
      display: flex; justify-content: center; padding: 3rem 0;
    }
    .spin {
      width: 28px; height: 28px;
      border: 1.5px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FLOATING NO-SELECT HINT ── */
    .hint {
      text-align: center;
      font-size: 0.7rem; color: var(--muted);
      padding: 0.5rem 1rem 1rem;
      letter-spacing: 0.06em;
    }
  </style>
</head>

<script>
// ─────────────────────────────────────────────
// CONFIG — only edit these 3 lines
// ─────────────────────────────────────────────
const CFG = {
  WA_NUMBER:   "918433595240",         // 91 + your 10-digit number
  IG_USERNAME: "your_instagram_handle", // without @
  PRODUCTS:    "products.json"
};

// ─────────────────────────────────────────────
// CLASS: Product
// ─────────────────────────────────────────────
class Product {
  constructor({ id, name, price, image, tag = "" }) {
    this.id = id; this.name = name;
    this.price = price; this.image = image; this.tag = tag;
  }
  get priceLabel() { return `Rs. ${this.price}`; }
}

// ─────────────────────────────────────────────
// CLASS: ProductRepository
// ─────────────────────────────────────────────
class ProductRepository {
  constructor(path) { this.path = path; this._list = []; }

  async load() {
    const r = await fetch(this.path);
    this._list = (await r.json()).map(d => new Product(d));
    return this._list;
  }
  all()       { return this._list; }
  byId(id)    { return this._list.find(p => p.id === id); }

  // First 5 products become hero slides
  heroSlides() { return this._list.slice(0, 5); }
}

// ─────────────────────────────────────────────
// CLASS: CartManager
// ─────────────────────────────────────────────
class CartManager {
  constructor() { this._set = new Set(); }
  toggle(id)    { this._set.has(id) ? this._set.delete(id) : this._set.add(id); }
  has(id)       { return this._set.has(id); }
  ids()         { return [...this._set]; }
  count()       { return this._set.size; }
}

// ─────────────────────────────────────────────
// CLASS: HeroSlider
// ─────────────────────────────────────────────
class HeroSlider {
  constructor(trackId, dotsId) {
    this.track   = document.getElementById(trackId);
    this.dotsEl  = document.getElementById(dotsId);
    this.current = 0;
    this.timer   = null;
  }

  init(products) {
    if (!products.length) return;

    // Build slides
    this.track.innerHTML = products.map(p => `
      <div class="hero-slide">
        <img src="${p.image}" alt="${p.name}" loading="eager" />
        <div class="hero-overlay"></div>
        <div class="hero-text">
          <h2>${p.name}</h2>
          <p>${p.priceLabel}</p>
        </div>
      </div>`).join("");

    // Build dots
    this.dotsEl.innerHTML = products.map((_, i) =>
      `<div class="hero-dot${i===0?' active':''}" data-i="${i}"></div>`
    ).join("");

    this.dotsEl.querySelectorAll(".hero-dot").forEach(d =>
      d.addEventListener("click", () => this.go(+d.dataset.i))
    );

    this.total = products.length;
    this._startAuto();

    // Touch swipe
    let sx = 0;
    this.track.addEventListener("touchstart", e => { sx = e.touches[0].clientX; }, { passive: true });
    this.track.addEventListener("touchend", e => {
      const dx = e.changedTouches[0].clientX - sx;
      if (Math.abs(dx) > 40) dx < 0 ? this.next() : this.prev();
    }, { passive: true });
  }

  go(i) {
    this.current = (i + this.total) % this.total;
    this.track.style.transform = `translateX(-${this.current * 100}%)`;
    this.dotsEl.querySelectorAll(".hero-dot").forEach((d, idx) =>
      d.classList.toggle("active", idx === this.current)
    );
    this._resetAuto();
  }

  next() { this.go(this.current + 1); }
  prev() { this.go(this.current - 1); }

  _startAuto() { this.timer = setInterval(() => this.next(), 3500); }
  _resetAuto()  { clearInterval(this.timer); this._startAuto(); }
}

// ─────────────────────────────────────────────
// CLASS: GalleryRenderer
// ─────────────────────────────────────────────
class GalleryRenderer {
  constructor(gridId, cart, onToggle) {
    this.el = document.getElementById(gridId);
    this.cart = cart; this.onToggle = onToggle;
  }

  render(products) {
    this.el.innerHTML = products.map(p => this._card(p)).join("");
    this.el.querySelectorAll(".card").forEach(c =>
      c.addEventListener("click", () => {
        const id = +c.dataset.id;
        this.onToggle(id);
        c.classList.toggle("sel", this.cart.has(id));
      })
    );
  }

  _card(p) {
    return `<div class="card${this.cart.has(p.id)?' sel':''}" data-id="${p.id}">
      <div class="card-img">
        <img src="${p.image}" alt="${p.name}" loading="lazy"/>
        ${p.tag ? `<span class="tag">${p.tag}</span>` : ""}
        <div class="tick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-price">${p.priceLabel}</div>
      </div>
    </div>`;
  }
}

// ─────────────────────────────────────────────
// CLASS: MessageBuilder
// ─────────────────────────────────────────────
class MessageBuilder {
  static build(repo, cart) {
    const names = cart.ids().map(id => {
      const p = repo.byId(id);
      return p ? `${p.name} (Rs.${p.price})` : "";
    }).filter(Boolean);

    if (!names.length) return "Hi, I want to order wall art prints from Pniktrix.";

    return `Hi, I want to order these wall art prints from Pniktrix:\n\n${names.map(n => `- ${n}`).join("\n")}\n\nPlease share size options and delivery details.`;
  }
}

// ─────────────────────────────────────────────
// CLASS: AppController
// ─────────────────────────────────────────────
class AppController {
  constructor() {
    this.repo     = new ProductRepository(CFG.PRODUCTS);
    this.cart     = new CartManager();
    this.slider   = new HeroSlider("hero-track", "hero-dots");
    this.renderer = null;
  }

  async init() {
    // Dismiss splash
    setTimeout(() => document.getElementById("splash").classList.add("out"), 2600);

    let products = [];
    try {
      products = await this.repo.load();
    } catch {
      products = this._fallback();
    }

    // Hero slider with first 5 products
    this.slider.init(this.repo.heroSlides());

    // Gallery
    this.renderer = new GalleryRenderer("grid", this.cart, id => {
      this.cart.toggle(id);
      this._sync();
      // Fire FB pixel event when user selects an item
      if (typeof fbq !== "undefined") fbq("track", "AddToCart");
    });
    this.renderer.render(products);
    this._sync();
  }

  _sync() {
    const n = this.cart.count();

    // Header badge
    const hdrCta = document.getElementById("hdr-cta");
    const hdrN   = document.getElementById("hdr-n");
    hdrCta.classList.toggle("show", n > 0);
    hdrN.textContent = n;

    // Sticky bar
    document.getElementById("sticky-bar").classList.toggle("up", n > 0);

    // Preview strip
    const strip = document.getElementById("preview-strip");
    if (n === 0) { strip.classList.add("empty"); strip.innerHTML = ""; }
    else {
      strip.classList.remove("empty");
      strip.innerHTML = this.cart.ids().map(id => {
        const p = this.repo.byId(id);
        return p ? `<div class="pv-thumb"><img src="${p.image}" alt="${p.name}" loading="lazy"/></div>` : "";
      }).join("");
    }

    // Hint
    const hint = document.getElementById("hint");
    if (hint) hint.style.display = n > 0 ? "none" : "block";
  }

  openContact() { this.goWhatsApp(); }

  goWhatsApp() {
    if (typeof fbq !== "undefined") fbq("track", "Contact");
    const msg = MessageBuilder.build(this.repo, this.cart);
    window.open(`https://wa.me/${CFG.WA_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
  }

  goInstagram() {
    if (typeof fbq !== "undefined") fbq("track", "Contact");
    // Instagram DM deep link — works in-app and mobile browser
    const msg = MessageBuilder.build(this.repo, this.cart);
    // Try native DM link first, fallback to profile
    const url = `https://ig.me/m/${CFG.IG_USERNAME}`;
    window.open(url, "_blank");
  }

  _fallback() {
    return [
      new Product({ id:1, name:"Golden Horizon", price:"799", image:"https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=600&q=80", tag:"Popular" }),
      new Product({ id:2, name:"Midnight Forest", price:"899", image:"https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=600&q=80" }),
      new Product({ id:3, name:"Desert Bloom",   price:"749", image:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80", tag:"New" }),
      new Product({ id:4, name:"Ocean Calm",     price:"849", image:"https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=600&q=80" }),
    ];
  }
}

const App = new AppController();
document.addEventListener("DOMContentLoaded", () => App.init());
</script>
</body>
